# ===================================================================
# APPLICATION CORE CONFIGURATIONS
# ===================================================================
spring.application.name=WhereIsMyMoney
server.port=9090

# ===================================================================
# DATABASE CONFIGURATIONS (MySQL Instance Integration Mapping Profile)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/whereismymoney_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# HIBERNATE ORM & JPA ENGINE PROFILES
# ===================================================================
# Use "update" for rapid testing. Switch to "validate" in production environments.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================================================
# JACKSON JSON FORMATTING HANDLERS (Aligns database records with React payloads)
# ===================================================================
# Prevents backend from converting date arrays into numerical arrays

# ===================================================================
# LOGGING ROOT THREAD PROFILES
# ===================================================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
